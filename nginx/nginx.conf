worker_processes 1;

events {
    worker_connections 1024;
}

http {

    upstream authentik_https {
        server auth-server:9443;
        keepalive 10;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 443 ssl http2;
        server_name lab069.kasetsart.university;

        # Public cert shown to browser
        ssl_certificate     /etc/nginx/certs/nginx/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/nginx/privkey.pem;

        # Optional safer TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        location /auth/ {
            proxy_pass https://authentik_https/;
            proxy_http_version 1.1;

            # Forwarded headers for Authentik
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Verify Authentik's TLS cert
            proxy_ssl_server_name on;
            proxy_ssl_name auth-server;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/nginx/certs/ca/ca.crt;

            # If Authentik requires client cert from nginx
            # proxy_ssl_certificate     /etc/nginx/certs/nginx-client/client.crt;
            # proxy_ssl_certificate_key /etc/nginx/certs/nginx-client/client.key;
        }
    }
}